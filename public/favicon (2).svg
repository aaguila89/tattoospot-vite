<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Black background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#0a0a0a"/>

  <!-- Decorative line top -->
  <rect x="60" y="110" width="392" height="4" rx="2" fill="#d4a853"/>

  <!-- TATTOO text -->
  <text x="256" y="230"
    font-family="Georgia, serif"
    font-size="98"
    font-weight="900"
    fill="#f5f0e8"
    text-anchor="middle"
    letter-spacing="4">TATTOO</text>

  <!-- SPOT text in brand red -->
  <text x="256" y="350"
    font-family="Georgia, serif"
    font-size="122"
    font-weight="900"
    fill="#c84b2f"
    text-anchor="middle"
    letter-spacing="6">SPOT</text>

  <!-- Decorative line bottom -->
  <rect x="60" y="385" width="392" height="4" rx="2" fill="#d4a853"/>
</svg>
